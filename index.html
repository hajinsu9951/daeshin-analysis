                                        </thead>
                                        <tbody className="divide-y divide-gray-100 font-bold">
                                            {currentData.detailed[activeSubject].map((item, idx) => (
                                                <tr key={idx} className="hover:bg-indigo-50/40 transition-colors">
                                                    <td className="py-5 px-6 text-gray-700">{item.grade}등급</td>
                                                    <td className="py-5 px-6 text-center text-indigo-600">{item.school}명</td>
                                                    <td className="py-5 px-6 text-center text-gray-600">{item.schoolPct}%</td>
                                                    <td className="py-5 px-6 text-center text-gray-400">{item.nationalPct}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>

                        {/* 섹션 2: 코호트 분석 (보강된 히스토리 반영) */}
                        {currentData.history && (
                            <section className="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
                                <div className="flex flex-col lg:flex-row lg:items-center justify-between mb-10 gap-6">
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight flex items-center gap-3"><Icon name="TrendingUp" size={24} className="text-indigo-600" />등급별 코호트 시계열 분석</h2>
                                    <div className="flex items-center gap-1 bg-gray-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                        {['1등급', '2등급', '3등급', '4등급', '5등급', '6등급'].map(grade => (
                                            <button key={grade} onClick={() => setActiveTrendGrade(grade)} className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${activeTrendGrade === grade ? 'bg-white text-indigo-600 shadow-sm scale-105' : 'text-gray-400 hover:text-gray-500'}`}>{grade}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="h-[480px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={currentData.history.map(h => ({ name: h.period, 국어: h[activeTrendGrade]?.국어 || 0, 수학: h[activeTrendGrade]?.수학 || 0, 영어: h[activeTrendGrade]?.영어 || 0 }))} margin={{ top: 30, right: 60, left: 10, bottom: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 13, fontWeight: 700}} dy={10} />
                                            <YAxis axisLine={false} tickLine={false} unit="%" tick={{fontSize: 12}} />
                                            <Tooltip contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 30px rgba(0,0,0,0.1)'}} />
                                            <Legend verticalAlign="top" align="right" iconType="circle" />
                                            <Line name="국어" dataKey="국어" stroke="#6366f1" strokeWidth={6} dot={{r: 8}} className="line-dot" label={{position: 'top', dy:-15, fontSize:15, fontWeight:900, fill: '#4338ca', formatter:(v)=>`${v}%`}} />
                                            <Line name="수학" dataKey="수학" stroke="#10b981" strokeWidth={6} dot={{r: 8}} className="line-dot" label={{position: 'bottom', dy:25, fontSize:15, fontWeight:900, fill: '#064e3b', formatter:(v)=>`${v}%`}} />
                                            <Line name="영어" dataKey="영어" stroke="#f59e0b" strokeWidth={6} dot={{r: 8}} className="line-dot" label={{position: 'top', dy:-45, fontSize:15, fontWeight:900, fill: '#92400e', formatter:(v)=>`${v}%`}} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </section>
                        )}

                        {/* 섹션 3: 전략 제언 */}
                        <section className="bg-indigo-950 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden text-white">
                            <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none"><Icon name="Target" size={400} /></div>
                            <div className="relative z-10">
                                <div className="flex items-center gap-5 mb-10">
                                    <Icon name="Award" size={48} className="text-amber-400" />
                                    <h3 className="text-3xl font-black tracking-widest uppercase italic underline decoration-amber-400 decoration-4 underline-offset-8">Strategic Insight</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-indigo-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="BookOpen" size={20} /> Korean Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{STRATEGIC_ADVISORY[activeTab].kor}</p>
                                    </div>
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-emerald-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="TrendingUp" size={20} /> Math Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{STRATEGIC_ADVISORY[activeTab].math}</p>
                                    </div>
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-amber-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="Zap" size={20} /> English Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{STRATEGIC_ADVISORY[activeTab].eng}</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="w-full max-w-7xl mt-20 mb-10 text-center text-gray-500 text-[11px] font-bold tracking-[0.3em] uppercase opacity-60">
                        &copy; 2026 DAEJEON DAESHIN HIGH SCHOOL · ACADEMIC INTELLIGENCE HUB · DATA CONSOLIDATED
                        <br />
                        <span className="mt-2 inline-block italic font-black text-gray-400">Created by HA JIN SU</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
