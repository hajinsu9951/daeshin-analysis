                                                    <td className="py-5 px-6 text-gray-700">{item.grade}등급</td>
                                                    <td className="py-5 px-6 text-center text-indigo-600">{item.school}명</td>
                                                    <td className="py-5 px-6 text-center text-gray-600">{item.schoolPct}%</td>
                                                    <td className="py-5 px-6 text-center text-gray-400">{item.nationalPct}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </section>

                        {/* 섹션 2: 코호트 시계열 분석 (복원 완료) */}
                        {currentData.history && (
                            <section className="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-8">
                                <div className="flex flex-col lg:flex-row lg:items-center justify-between mb-10 gap-6">
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight flex items-center gap-3"><Icon name="Chart" size={24} className="text-indigo-600" />등급별 코호트 시계열 분석</h2>
                                    <div className="flex items-center gap-1 bg-gray-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                        {['1등급', '2등급', '3등급', '4등급', '5등급', '6등급'].map(grade => (
                                            <button key={grade} onClick={() => setActiveTrendGrade(grade)} className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${activeTrendGrade === grade ? 'bg-white text-indigo-600 shadow-sm scale-105' : 'text-gray-400 hover:text-indigo-500'}`}>{grade}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="h-[450px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={currentData.history.map(h => ({ name: h.period, 국어: h[activeTrendGrade]?.국어 || 0, 수학: h[activeTrendGrade]?.수학 || 0, 영어: h[activeTrendGrade]?.영어 || 0 }))} margin={{ top: 30, right: 60, left: 10, bottom: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 13, fontWeight: 700}} dy={10} />
                                            <YAxis axisLine={false} tickLine={false} unit="%" tick={{fontSize: 12}} />
                                            <Tooltip contentStyle={{borderRadius: '16px', border: 'none'}} />
                                            <Legend verticalAlign="top" align="right" iconType="circle" />
                                            <Line name="국어" dataKey="국어" stroke="#6366f1" strokeWidth={5} dot={{r: 6}} label={{position: 'top', dy:-15, fontSize:15, fontWeight:900, fill: '#4338ca', formatter:(v)=>`${v}%`}} />
                                            <Line name="수학" dataKey="수학" stroke="#10b981" strokeWidth={5} dot={{r: 6}} label={{position: 'bottom', dy:25, fontSize:15, fontWeight:900, fill: '#064e3b', formatter:(v)=>`${v}%`}} />
                                            <Line name="영어" dataKey="영어" stroke="#f59e0b" strokeWidth={5} dot={{r: 6}} label={{position: 'top', dy:-45, fontSize:15, fontWeight:900, fill: '#92400e', formatter:(v)=>`${v}%`}} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </section>
                        )}

                        {/* [NEW] 섹션 3: 대입 지원 가능 인원 예측 (Tight vs Flexible) */}
                        <section className="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 p-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10"><Icon name="TrendUp" size={200} /></div>
                            <div className="flex items-center gap-4 mb-12 relative z-10">
                                <div className="p-3 bg-indigo-950 rounded-2xl text-white shadow-xl shadow-indigo-100"><Icon name="Target" size={28} /></div>
                                <div>
                                    <h2 className="text-2xl font-black text-gray-800 tracking-tight uppercase">대입 지원 가능 인원 예측 (Simulation)</h2>
                                    <p className="text-sm text-slate-400 font-bold uppercase tracking-tighter italic">Conservative (Tight) vs Potential (Flexible) Group</p>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 relative z-10">
                                {univPredictionData.map((univ, idx) => (
                                    <div key={idx} className={`univ-card bg-gradient-to-br ${univ.color} p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden group border border-white/5`}>
                                        <div className="absolute -right-6 -bottom-6 opacity-10 group-hover:scale-125 group-hover:rotate-12 transition-all duration-700">
                                            <Icon name={univ.icon} size={180} />
                                        </div>
                                        
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="text-2xl font-black opacity-95 uppercase italic tracking-tighter leading-none">{univ.title}</h3>
                                            <span className="bg-white/10 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-white/10">{univ.tag}</span>
                                        </div>
                                        <p className="text-[10px] font-bold mb-10 text-indigo-100/60 flex items-center gap-2">
                                            <Icon name="Check" size={10} /> {univ.desc}
                                        </p>
                                        
                                        <div className="space-y-4">
                                            {/* Tight Case */}
                                            <div className="bg-white/5 backdrop-blur-md p-5 rounded-3xl border border-white/10 flex justify-between items-center group-hover:bg-white/10 transition-colors">
                                                <div>
                                                    <span className="text-[10px] font-black block uppercase tracking-widest text-indigo-200/80">Tight (보수)</span>
                                                    <p className="text-[9px] font-bold text-indigo-200/40">정시 안정 합격권</p>
                                                </div>
                                                <div className="flex items-baseline gap-1">
                                                    <span className="text-4xl font-black tracking-tighter">{univ.tight}</span>
                                                    <span className="text-sm font-bold opacity-60">명</span>
                                                </div>
                                            </div>
                                            
                                            {/* Flexible Case */}
                                            <div className="bg-emerald-500/10 backdrop-blur-md p-5 rounded-3xl border border-emerald-400/20 flex justify-between items-center group-hover:bg-emerald-500/20 transition-colors">
                                                <div>
                                                    <span className="text-[10px] font-black block uppercase tracking-widest text-emerald-300/80">Flexible (유연)</span>
                                                    <p className="text-[9px] font-bold text-emerald-300/40">수시 도전 및 잠재권</p>
                                                </div>
                                                <div className="flex items-baseline gap-1">
                                                    <span className="text-4xl font-black tracking-tighter text-emerald-300">{univ.flex}</span>
                                                    <span className="text-sm font-bold opacity-60 text-emerald-300">명</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-12 p-6 bg-indigo-50/50 rounded-[1.5rem] border border-indigo-100 flex items-start gap-4">
                                <Icon name="Zap" size={20} className="text-indigo-600 mt-1 shrink-0" />
                                <div className="text-[11px] text-indigo-900/60 leading-relaxed font-bold italic">
                                    * 본 수치는 2026학년도 대입 전형별 가중치와 대신고 최근 3개년 입결 데이터를 결합한 시뮬레이션 결과입니다.<br/>
                                    * **Tight**: 전국 백분위 기준 정시 80% 컷 이내 인원 / **Flexible**: 수능 최저 사수 가능권 및 본교 창체/세특 경쟁력 합산 인원.
                                </div>
                            </div>
                        </section>

                        {/* 섹션 4: 전략 제언 */}
                        <section className="bg-indigo-950 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden text-white">
                            <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none"><Icon name="Target" size={400} /></div>
                            <div className="relative z-10">
                                <div className="flex items-center gap-5 mb-10">
                                    <Icon name="Award" size={48} className="text-amber-400" />
                                    <h3 className="text-3xl font-black tracking-widest uppercase italic underline decoration-amber-400 decoration-4 underline-offset-8">Strategic Insight</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-indigo-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="Book" size={20} /> Korean Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{ADVISORY[activeTab].kor}</p>
                                    </div>
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-emerald-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="Chart" size={20} /> Math Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{ADVISORY[activeTab].math}</p>
                                    </div>
                                    <div className="bg-white/10 p-7 rounded-3xl border border-white/20 backdrop-blur-lg hover:bg-white/15 transition-all">
                                        <div className="flex items-center gap-3 mb-4 text-amber-300 font-black uppercase italic tracking-tighter">
                                            <Icon name="Zap" size={20} /> English Strategy
                                        </div>
                                        <p className="leading-relaxed font-medium opacity-90">{ADVISORY[activeTab].eng}</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="mt-20 mb-10 text-center text-gray-500 text-[11px] font-bold tracking-[0.3em] uppercase opacity-60">
                        &copy; 2026 DAEJEON DAE SHIN HIGH SCHOOL · ACADEMIC INTELLIGENCE HUB · DATA CONSOLIDATED
                        <br />
                        <span className="mt-2 inline-block italic font-black text-gray-400 underline decoration-indigo-200 underline-offset-4 uppercase">Created by HA JIN SU</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
